name: CI

on:
  push:
    paths-ignore:
      - 'openapi/**'
      - '**.md'
    branches:
      - main
      - 'release/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - 'release/*'

defaults:
  run:
    shell: bash

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY_URL: tip-tip-wlan-cloud-ucentral.jfrog.io
      DOCKER_REGISTRY_USERNAME: ucentral
    outputs:
      has_wlan_testing_pat: ${{ steps.check-secrets.outputs.has_wlan_testing_pat }}
    steps:
    - name: Check secrets availability
      id: check-secrets
      env:
        DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        WLAN_TESTING_PAT: ${{ secrets.WLAN_TESTING_PAT }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      run: |
        if [ -n "$DOCKER_REGISTRY_PASSWORD" ]; then
          echo "has_docker_registry_password=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_docker_registry_password=false" >> "$GITHUB_OUTPUT"
        fi
        if [ -n "$WLAN_TESTING_PAT" ]; then
          echo "has_wlan_testing_pat=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_wlan_testing_pat=false" >> "$GITHUB_OUTPUT"
        fi
        if [ -n "$SLACK_WEBHOOK" ]; then
          echo "has_slack_webhook=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_slack_webhook=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout actions repo
      if: steps.check-secrets.outputs.has_docker_registry_password == 'true'
      uses: actions/checkout@v3
      with:
        repository: Telecominfraproject/.github
        path: github

    - name: Build and push Docker image
      if: steps.check-secrets.outputs.has_docker_registry_password == 'true'
      uses: ./github/composite-actions/docker-image-build
      with:
        image_name: owsec
        registry: tip-tip-wlan-cloud-ucentral.jfrog.io
        registry_user: ucentral
        registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

    - name: Checkout repository (Fallback for forks/no secrets)
      if: steps.check-secrets.outputs.has_docker_registry_password == 'false'
      uses: actions/checkout@v3

    - name: Set up Docker Buildx (Fallback for forks/no secrets)
      if: steps.check-secrets.outputs.has_docker_registry_password == 'false'
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (Fallback for forks/no secrets)
      if: steps.check-secrets.outputs.has_docker_registry_password == 'false'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: owsec:latest

    - name: Notify on failure via Slack
      if: failure() && github.ref == 'refs/heads/main' && steps.check-secrets.outputs.has_slack_webhook == 'true'
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_USERNAME: GitHub Actions failure notifier
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_COLOR: "${{ job.status }}"
        SLACK_ICON: https://raw.githubusercontent.com/quintessence/slack-icons/master/images/github-logo-slack-icon.png
        SLACK_TITLE: Docker build failed for OWSec service

  trigger-testing:
    needs: docker
    if: startsWith(github.ref, 'refs/pull/') && needs.docker.outputs.has_wlan_testing_pat == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Get base branch name and set as output
      id: get_base_branch
      run: |
        echo "branch=$(echo ${GITHUB_BASE_REF##*/})" >> $GITHUB_OUTPUT
        echo "owgw_branch=$(echo ${GITHUB_BASE_REF##*/} | sed 's/main/master/g')" >> $GITHUB_OUTPUT

    - name: Checkout actions repo
      uses: actions/checkout@v3
      with:
        repository: Telecominfraproject/.github
        path: github

    - name: Trigger testing of OpenWifi Docker Compose deployment and wait for result
      uses: ./github/composite-actions/trigger-workflow-and-wait
      env:
        BASE_BRANCH: ${{ steps.get_base_branch.outputs.branch }}
        OWGW_BASE_BRANCH: ${{ steps.get_base_branch.outputs.owgw_branch }}
      with:
        owner: Telecominfraproject
        repo: wlan-testing
        workflow: ow_docker-compose.yml
        token: ${{ secrets.WLAN_TESTING_PAT }}
        ref: master
        inputs: '{"deployment_version": "${{ env.BASE_BRANCH }}", "owgw_version": "${{ env.OWGW_BASE_BRANCH }}", "owsec_version": "${{ github.sha }}", "owfms_version": "${{ env.BASE_BRANCH }}", "owprov_version": "${{ env.BASE_BRANCH }}", "owanalytics_version": "${{ env.BASE_BRANCH }}", "owsub_version": "${{ env.BASE_BRANCH }}", "microservice": "owsec"}'

  trigger-deploy-to-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - docker
    steps:
    - name: Checkout actions repo
      uses: actions/checkout@v3
      with:
        repository: Telecominfraproject/.github
        path: github

    - name: Trigger deployment of the latest version to dev instance and wait for result
      uses: ./github/composite-actions/trigger-workflow-and-wait
      with:
        owner: Telecominfraproject
        repo: wlan-testing
        workflow: ucentralgw-dev-deployment.yaml
        token: ${{ secrets.WLAN_TESTING_PAT }}
        ref: master
        inputs: '{"force_latest": "true"}'
